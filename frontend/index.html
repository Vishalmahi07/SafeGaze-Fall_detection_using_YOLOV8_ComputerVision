<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fall Detection Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Fall Detection System</h1>
            <button id="test-alert-btn">Test Alert</button>
        </header>
        
        <div class="main-content">
            <div class="video-container glass-panel">
                <h2>Live Feed</h2>
                <div class="feed-wrapper">
                    <img id="video-feed" src="/video_feed" alt="Live WebCam Feed">
                </div>
            </div>
            
            <div class="side-panel glass-panel">
                <h2>System Status</h2>
                <div id="status-badge" class="status-badge normal">
                    NORMAL
                </div>
                
                <h2>Recent Alerts</h2>
                <div class="table-container">
                    <table id="alerts-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="alerts-tbody">
                            <!-- Alerts populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
