<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGaze — Live Monitor</title>
    <meta name="description" content="SafeGaze real-time fall detection live feed monitor">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/chat.css">
</head>
<body>
    <!-- Monitor Top Bar -->
    <div class="monitor-topbar">
        <a href="/dashboard" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
            </svg>
            Back to Dashboard
        </a>
        <div class="monitor-brand">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
                <circle cx="12" cy="12" r="10" stroke="url(#mt-grad)" stroke-width="2"/>
                <path d="M8 12 L12 8 L16 12 L12 18 Z" fill="url(#mt-grad)" opacity="0.9"/>
                <defs>
                    <linearGradient id="mt-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#60a5fa"/><stop offset="1" stop-color="#818cf8"/>
                    </linearGradient>
                </defs>
            </svg>
            <span>SafeGaze Live Monitor</span>
        </div>
        <a href="/logout" class="monitor-logout">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Logout
        </a>
    </div>

    <div class="dashboard">
        <div class="main-content">
            <div class="video-container glass-panel">
                <h2>
                    <span class="live-dot-small"></span>
                    Live Feed
                </h2>
                <div class="feed-wrapper">
                    <img id="video-feed" src="/video_feed" alt="Live WebCam Feed">
                    <div class="feed-overlay-corner feed-corner-tl"></div>
                    <div class="feed-overlay-corner feed-corner-tr"></div>
                    <div class="feed-overlay-corner feed-corner-bl"></div>
                    <div class="feed-overlay-corner feed-corner-br"></div>
                </div>
            </div>

            <div class="side-panel glass-panel">
                <h2>System Status</h2>
                <div id="status-badge" class="status-badge normal">NORMAL</div>

                <div class="controls-section">
                    <button id="test-alert-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                        </svg>
                        Test Alert
                    </button>
                </div>

                <h2>Recent Alerts</h2>
                <div class="table-container">
                    <table id="alerts-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="alerts-tbody">
                            <!-- Alerts populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
    <script src="/static/chat.js"></script>
</body>
</html>
